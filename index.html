<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coming Soon</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- Video Background -->
    <video autoplay muted loop playsinline id="bg-video">
        <source src="website_back.mp4" type="video/mp4">
    </video>

    <!-- Video Overlay (for readability) -->
    <div id="video-overlay"></div>

    <!-- Header added and changed -->
    <header class="Header">
        <img src="images/logo-icon.png" class="logo-left" alt="Logo Icon" />

        <nav class="navbar">
            <a href="#home">Home</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <!-- First Section: Logo (replaces Coming Soon) -->
    <section id="home" class="section home-section">
        <div class="card fade-in">
            <img src="images/logo-main.png" alt="Ascnd Studios Logo" class="alternate-logo" />
            <p class="tagline">Elevated Visuals to Elevated Growth</p>
        </div>
    </section>

    <!-- Second Section: Contact Me -->
    <section id="contact" class="section contact-section">
        <h2>Contact Me</h2>
        <form id="contact-form" action="https://formsubmit.co/justinc.cercado@gmail.com" method="POST">
            <input type="text" name="name" placeholder="Your Name" required />
            <input type="email" name="email" placeholder="Your Email" required />
            <textarea name="message" placeholder="Your Message" required></textarea>
            <button type="submit">Send</button>
        </form>
    </section>

    <!-- Footer -->
    <footer class="site-footer">
        <img src="images/Ascnd.png" alt="Footer Logo" class="footer-logo" />
    </footer>

    <!-- Popup -->
    <div id="popup">
        <div class="popup-content">
            <p>Message sent successfully!</p>
            <button onclick="closePopup()">Close</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
