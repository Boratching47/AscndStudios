<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ascnd Studios</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <a class="skip-link" href="#home">Skip to content</a>
    <div id="video" aria-hidden="true"></div>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="website_back.mp4" type="video/mp4" />
    </video>
    <div id="video-overlay"></div>

    <header class="site-header">
        <button type="button" class="nav-toggle" id="nav-toggle" aria-expanded="false" aria-controls="site-nav" aria-label="Open menu">
            <span class="nav-toggle-bar" aria-hidden="true"></span>
            <span class="nav-toggle-bar" aria-hidden="true"></span>
        </button>
        <a href="index.html" class="header-logo">
            <img src="images/logo-icon.png" width="48" height="48" alt="Ascnd Studios" />
        </a>
    </header>

    <div class="nav-overlay" id="nav-overlay" hidden></div>
    <nav class="site-nav" id="site-nav" aria-label="Main">
        <ul class="site-nav-list">
            <li><a href="index.html#home">Home</a></li>
            <li><a href="portfolio.html">Our Work</a></li>
            <li><a href="contact.html">Contacts</a></li>
        </ul>
    </nav>

    <section id="home" class="section home-section">
        <div class="card fade-in">
            <img src="images/logo-main.png" alt="Ascnd Studios Logo" class="alternate-logo" />
            <p class="tagline">Elevated Visuals to Elevated Growth</p>
        </div>
    </section>

    <section id="contact" class="section contact-section">
        <h2>Contact Us</h2>
        <p class="contact-lead">Get in touch to get your free quote—tell us about your project.</p>
        <form id="contact-form" action="https://formsubmit.co/info@ascndstudios.com" method="POST">
            <input type="hidden" name="_captcha" value="false" />
            <input type="hidden" name="_template" value="box" />
            <input type="text" name="name" placeholder="Your Name" required autocomplete="name" />
            <input type="email" name="email" placeholder="Your Email" required autocomplete="email" />
            <textarea name="message" placeholder="Your Message" required></textarea>
            <button type="submit">Send</button>
        </form>
    </section>

    <footer class="site-footer">
        <div class="footer-inner">
            <p class="footer-heading">Contacts</p>
            <a href="mailto:info@ascndstudios.com" class="footer-link">Email</a>
            <a href="https://www.instagram.com/ascndstudio/" class="footer-link" target="_blank" rel="noopener noreferrer">Instagram</a>
        </div>
    </footer>

    <div id="popup" role="dialog" aria-modal="true" aria-labelledby="popup-text" aria-hidden="true">
        <div class="popup-content">
            <p id="popup-text">Message sent successfully!</p>
            <button type="button" id="popup-close">Close</button>
        </div>
    </div>

    <script src="nav.js"></script>
    <script src="script.js"></script>
</body>
</html>
